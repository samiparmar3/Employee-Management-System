<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employee Management System</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- ==========================
         HEADER
    =========================== -->

    <header class="header">

        <div class="logo">

            <i class="fa-solid fa-building"></i>

            <h2>Employee Management System</h2>

        </div>

        <button id="darkModeBtn" class="dark-btn">

            <i class="fa-solid fa-moon"></i>

        </button>

    </header>


    <!-- ==========================
         DASHBOARD
    =========================== -->

    <section class="dashboard">

        <div class="card">

            <h3>Total Employees</h3>

            <p id="totalEmployees">0</p>

        </div>

        <div class="card">

            <h3>Total Managers</h3>

            <p id="totalManagers">0</p>

        </div>

        <div class="card">

            <h3>Total Departments</h3>

            <p id="totalDepartments">0</p>

        </div>

        <div class="card">

            <h3>Total Payroll</h3>

            <p id="totalPayroll">₹0</p>

        </div>

    </section>


    <!-- ==========================
         CONTROLS
    =========================== -->

    <section class="controls">

        <button id="addEmployeeBtn" class="primary-btn">

            <i class="fa-solid fa-user-plus"></i>

            Add Employee

        </button>

        <button id="addManagerBtn" class="secondary-btn">

            <i class="fa-solid fa-user-tie"></i>

            Add Manager

        </button>

        <input
            type="text"
            id="searchInput"
            placeholder="Search Employee..."
        >

        <select id="departmentFilter">

            <option value="all">
                All Departments
            </option>

            <option value="HR">
                HR
            </option>

            <option value="IT">
                IT
            </option>

            <option value="Finance">
                Finance
            </option>

            <option value="Marketing">
                Marketing
            </option>

            <option value="Operations">
                Operations
            </option>

        </select>

    </section>


    <!-- ==========================
         EMPLOYEE TABLE
    =========================== -->

    <section class="table-container">

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Email</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="employeeTableBody">

            </tbody>

        </table>

    </section>


    <!-- ==========================
         MODAL
    =========================== -->

    <div class="modal" id="employeeModal">

        <div class="modal-content">

            <div class="modal-header">

                <h2 id="modalTitle">
                    Add Employee
                </h2>

                <button id="closeModal">

                    <i class="fa-solid fa-xmark"></i>

                </button>

            </div>


            <form id="employeeForm">

                <input
                    type="hidden"
                    id="employeeId"
                >

                <input
                    type="hidden"
                    id="employeeType"
                >


                <!-- Name -->

                <div class="form-group">

                    <label>Name</label>

                    <input
                        type="text"
                        id="name"
                        required
                    >

                </div>


                <!-- Email -->

                <div class="form-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        required
                    >

                </div>


                <!-- Department -->

                <div class="form-group">

                    <label>Department</label>

                    <select id="department">

                        <option>HR</option>
                        <option>IT</option>
                        <option>Finance</option>
                        <option>Marketing</option>
                        <option>Operations</option>

                    </select>

                </div>


                <!-- Salary -->

                <div class="form-group">

                    <label>Base Salary</label>

                    <input
                        type="number"
                        id="salary"
                        required
                    >

                </div>


                <!-- Manager Bonus -->

                <div
                    class="form-group"
                    id="bonusGroup"
                >

                    <label>Manager Bonus</label>

                    <input
                        type="number"
                        id="bonus"
                    >

                </div>


                <button
                    type="submit"
                    class="save-btn"
                >

                    Save Record

                </button>

            </form>

        </div>

    </div>


    <!-- ==========================
         FOOTER
    =========================== -->

    <footer>

        <p>

            Employee Management System
            | OOP Project using
            Classes & Inheritance

        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
